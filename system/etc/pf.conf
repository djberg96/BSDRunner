# BSDRunner desktop pf baseline for FreeBSD.
# Destination: /etc/pf.conf
#
# This is a single-machine desktop/laptop firewall policy:
#
# - allow connections this computer starts
# - block unsolicited inbound connections
# - keep local networking features like DHCP, IPv6 neighbor discovery,
#   ping diagnostics, and mDNS working
#
# It is not a router, NAT gateway, jail host, or public server ruleset.
# It also does not allow inbound SSH yet.

# Macros are named values that can be reused later in rules.
# Keeping related ICMP types in one place makes the rules easier to read.
#
# ICMP is not just "ping". It also carries useful network error messages.
# These IPv4 types allow:
#
# - echoreq: inbound ping requests
# - unreach: destination-unreachable errors
# - timex: time-exceeded errors used by tools like traceroute
icmp_types = "{ echoreq, unreach, timex }"

# ICMPv6 is even more important than IPv4 ICMP. IPv6 depends on it for
# neighbor discovery and path MTU discovery, so blocking too much ICMPv6
# can make IPv6 look randomly broken.
#
# These IPv6 types allow:
#
# - echoreq: inbound ping6 requests
# - unreach: destination-unreachable errors
# - timex: time-exceeded errors
# - paramprob: packet parameter problem errors
# - routersol/routeradv: router discovery on the local network
# - neighbrsol/neighbradv: neighbor discovery, similar in spirit to ARP
# - toobig: path MTU discovery, needed when packets must be smaller
icmp6_types = "{ echoreq, unreach, timex, paramprob, routersol, routeradv, neighbrsol, neighbradv, toobig }"

# Do not filter loopback traffic.
#
# lo0 is the local-only interface used when programs talk to services on
# the same machine, such as 127.0.0.1 or ::1. Filtering it can break local
# apps in confusing ways, so desktop rulesets normally skip it.
set skip on lo0

# When a packet is blocked, return an error instead of silently dropping it.
#
# For TCP this usually sends a reset; for UDP it usually sends an ICMP
# unreachable. This makes local desktop apps fail quickly instead of waiting
# for a long timeout. A stealthier server might prefer "drop" instead.
set block-policy return

# Reassemble fragmented packets before filtering.
#
# Fragmented packets can otherwise hide the TCP/UDP details that rules need
# to inspect. FreeBSD 14+ supports this modern normalization option.
set reassemble yes

# Default deny.
#
# pf evaluates rules from top to bottom, with later matching rules usually
# able to override earlier ones unless "quick" is used. Starting with
# "block all" means every packet is denied unless a later pass rule allows it.
block all

# Allow outbound desktop traffic.
#
# This lets the machine initiate normal connections: web browsing, DNS,
# package downloads, SSH to other machines, NTP, and so on.
#
# "keep state" records the connection in pf's state table. Replies to
# outbound connections are then allowed back in automatically, without
# needing separate inbound rules for each application.
pass out all keep state

# Allow selected inbound IPv4 ICMP diagnostics.
#
# This permits other systems to ping this machine and lets useful network
# errors reach it. The rule is "quick", so once it matches, pf stops checking
# later rules for that packet.
pass in quick inet proto icmp icmp-type $icmp_types keep state

# Allow essential inbound IPv6 ICMP.
#
# This is broader than the IPv4 ICMP rule because IPv6 needs ICMPv6 for core
# local-network behavior. Removing router or neighbor discovery types can
# break IPv6 even when regular outbound rules look correct.
pass in quick inet6 proto icmp6 icmp6-type $icmp6_types keep state

# Allow DHCP client replies for IPv4.
#
# DHCP is how the laptop usually receives an IPv4 address, router, and DNS
# configuration from the network. The server replies from UDP port 67 to the
# client on UDP port 68.
pass in quick inet proto udp from any port 67 to any port 68 keep state

# Allow DHCPv6 client replies.
#
# DHCPv6 uses UDP port 547 on the server side and UDP port 546 on the client
# side. fe80::/10 is the IPv6 link-local range, which is normal for this
# traffic on a local network segment.
pass in quick inet6 proto udp from fe80::/10 port 547 to fe80::/10 port 546 keep state

# Allow IPv4 mDNS.
#
# mDNS uses UDP port 5353 to the multicast address 224.0.0.251. It is used
# for local discovery features such as printers, media/casting devices, and
# .local hostnames. Remove this if you want a quieter, less discoverable host.
pass in quick inet proto udp from any to 224.0.0.251 port 5353 keep state

# Allow IPv6 mDNS.
#
# ff02::fb is the IPv6 link-local multicast address for mDNS. Restricting the
# source to fe80::/10 keeps this scoped to local-link discovery traffic.
pass in quick inet6 proto udp from fe80::/10 to ff02::fb port 5353 keep state
