# Minimal Hyprland session for the BSDRunner greeter.

source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/environment.conf
source = ~/.config/hypr/conf/input.conf

monitor = ,preferred,auto,1

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
    resize_on_border = false
}

decoration {
    rounding = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

bind = SUPER, Escape, exit

exec-once = sh ~/.config/bsdrunner/scripts/bsdrunner-run-greeter.sh
